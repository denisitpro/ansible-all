---
- name: Check consul directory is exists
  ansible.builtin.stat:
    path: "{{ consul_config_dir | default('/etc/consul.d') }}"
  register: consul_config_dir_exists

- name: Copy node_exporter consul config
  ansible.builtin.template:
    src: "node_exporter.hcl.j2"
    dest: "/etc/consul.d/node_exporter.hcl"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - restart consul
    - restart-docker consul
  when:
    - consul_config_dir_exists.stat.exists
