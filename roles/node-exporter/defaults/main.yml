---
node_exporter_version_binary: "1.10.0"
node_exporter_bind_port: '9100'


node_exporter_go_arch_map:
  i386: '386'
  x86_64: 'amd64'
  aarch64: 'arm64'
  armv7l: 'armv7'
  armv6l: 'armv6'

node_exporter_go_arch: "{{ node_exporter_go_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"

node_exporter_system_user: "node-exporter"
node_exporter_system_group: "{{ node_exporter_system_user }}"

node_exporter_binary_path: "/usr/local/bin/node_exporter"
node_exporter_textfile_dir: "/var/lib/node-exporter"

node_exporter_enabled_collectors:
  - systemd
  - processes
  - textfile:
      directory: "{{ node_exporter_textfile_dir }}"
#  - filesystem:
#      ignored-mount-points: "^/(sys|proc|dev)($|/)"
#      ignored-fs-types: "^(sys|proc|auto)fs$"


node_exporter_disabled_collectors:
  - ipvs

node_exporter_download_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version_binary }}/node_exporter-{{ node_exporter_version_binary }}.linux-{{ node_exporter_go_arch }}.tar.gz"

# vault g1
# consul_node_exporter_token: "{{ vault_dict_users_secret.consul_all_exporters_token | default('set_me') }}"
# vault g2
consul_node_exporter_token: "{{ vault_dict_users_secret_g2.consul_all_exporters_token.value | default('set_me') }}"


node_exporter_tags:
  - "stand={{ stand_type }}"
  - "exporter={{ node_exporter_name | default('node-exporter') }}"
  - "dc={{ consul_dc_name }}"


scripts_path: /opt/scripts

# # not set sh file. its add to task
# node_exporter_textfile_scripts:
#   - inotify-metrics.sh
#  - ping-ipv4.sh



# consul section
# Consul installation mode: "docker" or "unit" (systemd)
consul_install_mode: "docker"
consul_compose_path: /opt/docker/consul