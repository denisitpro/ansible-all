---
# GeeseFS - https://github.com/yandex-cloud/geesefs
# FUSE-based S3 (Yandex, Amazon, etc.) filesystem
geesefs_version: "0.43.3"
geesefs_base_url: "https://github.com/yandex-cloud/geesefs/releases/download"

# Architecture mapping (ansible_facts["architecture"] -> release arch)
geesefs_arch_map:
  x86_64: "amd64"
  aarch64: "arm64"

geesefs_arch: "{{ geesefs_arch_map[ansible_facts['architecture']] | default('amd64') }}"
geesefs_binary_name: "geesefs-linux-{{ geesefs_arch }}"
geesefs_download_url: "{{ geesefs_base_url }}/v{{ geesefs_version }}/{{ geesefs_binary_name }}"
geesefs_temp_dir: "/tmp/geesefs-install"
geesefs_install_path: "/usr/local/bin/geesefs"

# Optional mount management.
geesefs_manage_mounts: false
geesefs_mounts: []

# Keep role data under /opt (project convention)
geesefs_base_path: /opt/geesefs

# Store credentials in explicit files and reference via `--shared-config=...`
geesefs_creds_dir: "{{ geesefs_base_path }}/creds"

# Base fstab options for fuse.geesefs mounts.
# `_netdev` marks network dependency; `nofail` avoids boot failure.
geesefs_fstab_common_opts: "_netdev,nofail,allow_other"



