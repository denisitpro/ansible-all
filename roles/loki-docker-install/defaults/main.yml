---
loki_version: 3.6.3

loki_compose_path: /opt/docker/loki
loki_data_path: /opt/loki

loki_user_id: 10001
loki_group_id: 10001

loki_config_file_name: local-config.yaml


loki_s3_access_key_id: "{{ vault_dict_users_secret_g2.loki_s3_credentials.AWS_ACCESS_KEY_ID | default('set_me') }}"
loki_s3_secret_access_key: "{{ vault_dict_users_secret_g2.loki_s3_credentials.AWS_SECRET_ACCESS_KEY | default('set_me') }}"


# Register Loki service in Consul on infra (for Prometheus service discovery)
loki_consul_discovery: true
loki_consul_service_name: loki


consul_loki_token: "{{ vault_dict_users_secret_g2.consul_all_exporters_token.value | default('set_me') }}"


consul_install_mode: "docker"
loki_nginx_alert_group_by: 'app,hostname'


