---
- name: stop loki compose
  community.docker.docker_compose_v2:
    project_src: "{{ loki_compose_path }}"
    state: absent
  ignore_errors: true  # noqa: ignore-errors

- name: remove loki data and files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "{{ loki_data_path }}"
    - "{{ loki_compose_path }}/docker-compose.yml"
