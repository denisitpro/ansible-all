---
- name: Ensure scripts directory exists
  ansible.builtin.file:
    path: /opt/scripts
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Ensure rclone log directory exists for video archive
  ansible.builtin.file:
    path: "{{ video_archive_backup_log_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Deploy video archive backup script
  ansible.builtin.template:
    src: video-archive-backup.sh.j2
    dest: /opt/scripts/video-archive-backup.sh
    mode: '0755'
    owner: root
    group: root
