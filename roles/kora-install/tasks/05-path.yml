---
- name: ensure /opt/docker exists
  ansible.builtin.file:
    path: /opt/docker
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: create compose directory for each kora instance
  ansible.builtin.file:
    path: "{{ _compose_path }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: "{{ kora_instances | default([{'name': 'kora'}]) }}"
  loop_control:
    loop_var: kora
  vars:
    _compose_path: "{{ kora.compose_path | default('/opt/docker/' + kora.name) }}"

- name: create base data directory for each kora instance
  ansible.builtin.file:
    path: "{{ _base_path }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: "{{ kora_instances | default([{'name': 'kora'}]) }}"
  loop_control:
    loop_var: kora
  vars:
    _base_path: "{{ kora.base_path | default('/opt/' + kora.name) }}"

- name: create config directory for each kora instance
  ansible.builtin.file:
    path: "{{ _base_path }}/config"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: "{{ kora_instances | default([{'name': 'kora'}]) }}"
  loop_control:
    loop_var: kora
  vars:
    _base_path: "{{ kora.base_path | default('/opt/' + kora.name) }}"

- name: create keys directory for each kora instance
  ansible.builtin.file:
    path: "{{ _base_path }}/keys"
    state: directory
    mode: '0700'
    owner: root
    group: root
  loop: "{{ kora_instances | default([{'name': 'kora'}]) }}"
  loop_control:
    loop_var: kora
  vars:
    _base_path: "{{ kora.base_path | default('/opt/' + kora.name) }}"
