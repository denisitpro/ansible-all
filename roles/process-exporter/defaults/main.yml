---
process_exporter_version: 0.8.7
process_exporter_conf_path: /etc/process-exporter
process_exporter_bind_addr: "{{ ansible_facts['default_ipv4']['address'] }}"

process_exporter_go_arch_map:
  x86_64: "amd64"
  aarch64: "arm64"

process_exporter_go_arch: "{{ process_exporter_go_arch_map[ansible_facts['architecture']] | default(ansible_facts['architecture']) }}"

# default array for mon
processes_to_monitor:
  - name: "node-exporter"
    cmdline: ["node-exporter"]
  - name: "process-exporter"
    cmdline: ["process-exporter"]

# consul_process_exporter_token: "{{ vault_dict_users_secret.consul_all_exporters_token | default('set_me') }}"
consul_process_exporter_token: "{{ vault_dict_users_secret_g2.consul_all_exporters_token.value | default('set_me') }}"

process_exporter_tags:
  - "{{ stand_type }}"
  - "{{ process_exporter_name | default('process-exporter') }}"
  # - "dc={{ consul_dc_name }}"
