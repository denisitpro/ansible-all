---
# Mount disks with LUKS encryption support (by device path)
- ansible.builtin.include_tasks: 16-loop-task-luks-sdx.yml
  loop: "{{ disk_mounts }}"
  loop_control:
    label: "{{ item.device | default('/dev/sdX') }}"
  when:
    - item.uuid is not defined or item.uuid | length == 0
    - item.luks_enabled | default(false) | bool

# Mount regular disks (by device path, no LUKS)
- ansible.builtin.include_tasks: 15-loop-task-dev-sdx.yml
  loop: "{{ disk_mounts }}"
  loop_control:
    label: "{{ item.device | default('/dev/sdX') }}"
  when:
    - item.uuid is not defined or item.uuid | length == 0
    - not (item.luks_enabled | default(false) | bool)

# Mount disks by UUID (no LUKS support for UUID-based mounts)
- ansible.builtin.include_tasks: 20-loop-task-uuid.yml
  loop: "{{ disk_mounts }}"
  loop_control:
    label: "{{ item.uuid | default('no-uuid') }}"
  when: item.uuid is defined and item.uuid | length > 0
