---
- name: Check if filesystem exists on disk
  ansible.builtin.command: blkid -o value -s TYPE {{ item.device | default('/dev/sdx') }}
  register: blkid_output
  ignore_errors: true
  changed_when: false
  failed_when: false

- name: Set filesystem facts
  ansible.builtin.set_fact:
    current_fs: "{{ blkid_output.stdout | trim }}"
    required_fs: "{{ item.fs | default('ext4') }}"
    fs_exists: "{{ blkid_output.rc == 0 }}"

- name: Unmount disk if filesystem type mismatch
  ansible.posix.mount:
    path: "{{ item.mount_point | default('/mnt/diskX') }}"
    state: unmounted
  when:
    - fs_exists | bool
    - current_fs != required_fs
  ignore_errors: true

- name: Wipe filesystem if type mismatch
  ansible.builtin.command: wipefs -a {{ item.device | default('/dev/sdx') }}
  when:
    - fs_exists | bool
    - current_fs != required_fs

- name: Create filesystem on the disk
  filesystem:
    fstype: "{{ required_fs }}"
    dev: "{{ item.device | default('/dev/sdx') }}"
  when: (not fs_exists | bool) or (current_fs != required_fs)

- name: Create mount point
  ansible.builtin.file:
    path: "{{ item.mount_point | default('/mnt/diskX') }}"
    state: directory
    mode: "0755"

- name: Mount the disk
  ansible.posix.mount:
    path: "{{ item.mount_point | default('/mnt/diskX') }}"
    src: "{{ item.device | default('/dev/sdx') }}"
    fstype: "{{ item.fs | default('xfs') }}"
    opts: "{{ item.opts | default('defaults') }}"
    state: mounted

- name: Ensure the mount is present in fstab
  ansible.posix.mount:
    path: "{{ item.mount_point | default('/mnt/diskX') }}"
    src: "{{ item.device | default('/dev/sdx') }}"
    fstype: "{{ item.fs | default('xfs') }}"
    opts: "{{ item.opts | default('defaults') }}"
    state: present
