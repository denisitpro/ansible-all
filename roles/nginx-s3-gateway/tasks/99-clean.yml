---
# Clean up nginx-s3-gateway
- name: Stop nginx-s3-gateway service
  community.docker.docker_compose_v2:
    project_src: "{{ nginx_s3_compose_path }}"
    state: absent
  ignore_errors: true  # noqa: ignore-errors

- name: Remove nginx-s3-gateway container
  community.docker.docker_container:
    name: nginx-s3-gateway
    state: absent
  ignore_errors: true  # noqa: ignore-errors

# - name: Remove nginx-s3-gateway directories
#   ansible.builtin.file:
#     path: "{{ item }}"
#     state: absent
#   with_items:
#     - "{{ nginx_s3_compose_path }}"

- name: Display clean up status
  ansible.builtin.debug:
    msg: "nginx-s3-gateway has been cleaned up"
