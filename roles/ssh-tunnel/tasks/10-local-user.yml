---
- name: Create SSH tunnel user
  ansible.builtin.user:
    name: "{{ ssh_tunnel_user }}"
    create_home: false
    shell: /usr/sbin/nologin
    system: true
    state: present
  register: ssh_tunnel_user_created

- name: Create SSH directory for tunnel user
  ansible.builtin.file:
    path: "/home/{{ ssh_tunnel_user }}/.ssh"
    state: directory
    owner: "{{ ssh_tunnel_user }}"
    group: "{{ ssh_tunnel_user }}"
    mode: "0700"

- name: Check if SSH key already exists
  ansible.builtin.stat:
    path: "/home/{{ ssh_tunnel_user }}/.ssh/id_ed25519"
  register: ssh_key_stat

- name: Generate SSH key for tunnel user
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f /home/{{ ssh_tunnel_user }}/.ssh/id_ed25519 -N "" -C "{{ ssh_tunnel_user }}@{{ inventory_hostname }}"
  become: true
  become_user: "{{ ssh_tunnel_user }}"
  when: not ssh_key_stat.stat.exists
  register: ssh_key_generation

- name: Set correct permissions for SSH key
  ansible.builtin.file:
    path: "/home/{{ ssh_tunnel_user }}/.ssh/{{ item }}"
    owner: "{{ ssh_tunnel_user }}"
    group: "{{ ssh_tunnel_user }}"
    mode: "{{ '0600' if item == 'id_ed25519' else '0644' }}"
  loop:
    - id_ed25519
    - id_ed25519.pub
  when: not ssh_key_stat.stat.exists

- name: Read public key content
  ansible.builtin.slurp:
    src: "/home/{{ ssh_tunnel_user }}/.ssh/id_ed25519.pub"
  register: ssh_public_key

- name: Set public key fact
  ansible.builtin.set_fact:
    ssh_tunnel_public_key: "{{ ssh_public_key.content | b64decode | trim }}"
