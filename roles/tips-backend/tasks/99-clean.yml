---
- name: stop tips-backend compose project for instance
  community.docker.docker_compose_v2:
    project_src: "{{ _compose_path }}"
    state: absent
  loop: "{{ tips_backend_instances | default([{'name': 'tips-backend'}]) }}"
  loop_control:
    loop_var: tip
  vars:
    _compose_path: "{{ tip.compose_path | default('/opt/docker/' + tip.name) }}"
  ignore_errors: true # noqa: ignore-errors

- name: remove generated compose file for instance
  ansible.builtin.file:
    path: "{{ _compose_path }}/docker-compose.yml"
    state: absent
  loop: "{{ tips_backend_instances | default([{'name': 'tips-backend'}]) }}"
  loop_control:
    loop_var: tip
  vars:
    _compose_path: "{{ tip.compose_path | default('/opt/docker/' + tip.name) }}"

# Note: data dirs (uploads/, telegram-bot-data/) live under /opt/<name>/ .
# Clean stops the project. By default only removes the compose file (data preserved).
# Uncomment below for full dir removal (destructive).
