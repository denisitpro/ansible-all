---
- name: ensure /opt/docker exists
  ansible.builtin.file:
    path: /opt/docker
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: create compose directory for each tips-backend instance
  ansible.builtin.file:
    path: "{{ _compose_path }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: "{{ tips_backend_instances | default([{'name': 'tips-backend'}]) }}"
  loop_control:
    loop_var: tip
  vars:
    _compose_path: "{{ tip.compose_path | default('/opt/docker/' + tip.name) }}"

- name: create base data directory for each tips-backend instance
  ansible.builtin.file:
    path: "{{ _base_path }}"
    state: directory
    mode: '0755'
    owner: "{{ tips_backend_uid }}"
    group: "{{ tips_backend_gid }}"
  loop: "{{ tips_backend_instances | default([{'name': 'tips-backend'}]) }}"
  loop_control:
    loop_var: tip
  vars:
    _base_path: "{{ tip.base_path | default('/opt/' + tip.name) }}"

- name: create uploads directory for each instance
  ansible.builtin.file:
    path: "{{ _base_path }}/uploads"
    state: directory
    mode: '0755'
    owner: "{{ tips_backend_uid }}"
    group: "{{ tips_backend_gid }}"
  loop: "{{ tips_backend_instances | default([{'name': 'tips-backend'}]) }}"
  loop_control:
    loop_var: tip
  vars:
    _base_path: "{{ tip.base_path | default('/opt/' + tip.name) }}"

- name: create telegram-bot-data directory for each instance
  ansible.builtin.file:
    path: "{{ _base_path }}/telegram-bot-data"
    state: directory
    mode: '0755'
    owner: "{{ tips_backend_uid }}"
    group: "{{ tips_backend_gid }}"
  loop: "{{ tips_backend_instances | default([{'name': 'tips-backend'}]) }}"
  loop_control:
    loop_var: tip
  vars:
    _base_path: "{{ tip.base_path | default('/opt/' + tip.name) }}"
