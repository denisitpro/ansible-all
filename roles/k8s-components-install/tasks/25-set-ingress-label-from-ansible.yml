---
# Apply K8s labels to ingress nodes based on Ansible inventory tags
# Uses ansible-set-tags role to discover nodes with k8s_ingress=nginx tag
# Requires k8s_hosts_tag_configs variable with ingress node configuration
#
# Example inventory tag: nbg1-c1-sigma-w-02.sigma-ops.org k8s_role=worker k8s_ingress=nginx
# Example k8s_hosts_tag_configs:
#   - tags:
#       k8s_ingress: nginx
#     output_var_name: k8s_ingress_nodes_list

- name: Include ansible-set-tags role to populate host lists
  ansible.builtin.include_role:
    name: ansible-set-tags

- name: Verify k8s_ingress_nodes_list is defined
  ansible.builtin.assert:
    that:
      - k8s_ingress_nodes_list is defined
    fail_msg: "Variable k8s_ingress_nodes_list is not defined. Ensure k8s_hosts_tag_configs contains entry with output_var_name: k8s_ingress_nodes_list and hosts have k8s_ingress=nginx tag."
    success_msg: "Using variable 'k8s_ingress_nodes_list' for ingress nodes list"

- name: Build final NGINX ingress node hostnames (supports k8s_ingress=nginx,traefik)
  ansible.builtin.set_fact:
    k8s_ingress_nodes_hostnames: >-
      {{
        (
          (k8s_ingress_nodes_list | default([]) | map(attribute='name') | list)
          +
          (
            hostvars
            | dict2items
            | selectattr('value.k8s_ingress', 'defined')
            | selectattr('value.k8s_ingress', 'search', '(^|,)\\s*nginx\\s*(,|$)')
            | map(attribute='key')
            | list
          )
        )
        | unique
      }}

- name: Debug ingress nodes from Ansible tags
  ansible.builtin.debug:
    msg: "Will apply label {{ k8s_ingress_label_key }}={{ k8s_ingress_label_value }} to node {{ item.split('.')[0] }}"
  loop: "{{ k8s_ingress_nodes_hostnames }}"

- name: Apply ingress label to nodes from Ansible tags
  ansible.builtin.command: >
    kubectl label nodes {{ item.split('.')[0] }}
    {{ k8s_ingress_label_key }}={{ k8s_ingress_label_value }}
    --overwrite
    --kubeconfig {{ k8s_config_path }}
  loop: "{{ k8s_ingress_nodes_hostnames }}"
  register: label_result
  changed_when: "'labeled' in label_result.stdout or 'not labeled' not in label_result.stdout"
  failed_when: label_result.rc != 0 and 'not found' in label_result.stderr

- name: Display labeling results
  ansible.builtin.debug:
    msg: "Successfully labeled {{ k8s_ingress_nodes_hostnames | length }} ingress node(s)"

- name: Build Traefik ingress nodes list from inventory tags
  ansible.builtin.set_fact:
    k8s_traefik_nodes_hostnames: >-
      {{
        hostvars
        | dict2items
        | selectattr('value.k8s_ingress', 'defined')
        | selectattr('value.k8s_ingress', 'search', '(^|,)\\s*' ~ (k8s_traefik_inventory_tag_value | default('traefik')) ~ '\\s*(,|$)')
        | map(attribute='key')
        | list
      }}
  when: "'traefik' in helm_componets_list"

- name: Show Traefik ingress nodes from inventory tags
  ansible.builtin.debug:
    msg: "Found {{ k8s_traefik_nodes_hostnames | length }} Traefik node(s): {{ k8s_traefik_nodes_hostnames | join(', ') }}"
  when: "'traefik' in helm_componets_list"

- name: Debug Traefik node labels to apply
  ansible.builtin.debug:
    msg: "Will apply label {{ k8s_traefik_label_key | default('ingress.traefik/enabled', true) }}={{ k8s_traefik_label_value | default('enabled', true) }} to node {{ item.split('.')[0] }}"
  loop: "{{ k8s_traefik_nodes_hostnames }}"
  when:
    - "'traefik' in helm_componets_list"
    - k8s_traefik_nodes_hostnames | length > 0

- name: Apply Traefik label to nodes from Ansible tags
  ansible.builtin.command: >
    kubectl label nodes {{ item.split('.')[0] }}
    {{ k8s_traefik_label_key | default('ingress.traefik/enabled', true) }}={{ k8s_traefik_label_value | default('enabled', true) }}
    --overwrite
    --kubeconfig {{ k8s_config_path }}
  loop: "{{ k8s_traefik_nodes_hostnames }}"
  when:
    - "'traefik' in helm_componets_list"
    - k8s_traefik_nodes_hostnames | length > 0
  register: traefik_label_result
  changed_when: "'not labeled' not in traefik_label_result.stdout"
  failed_when: traefik_label_result.rc != 0 and 'not found' in traefik_label_result.stderr

- name: Display Traefik labeling results
  ansible.builtin.debug:
    msg: "Successfully labeled {{ k8s_traefik_nodes_hostnames | length }} Traefik node(s)"
  when:
    - "'traefik' in helm_componets_list"
    - k8s_traefik_nodes_hostnames | length > 0
