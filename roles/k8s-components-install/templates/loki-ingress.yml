apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "{{k8s_loki_ingress_proxy_read_timeout | default('300')}}"
{% if k8s_loki_acl_whitelist is defined %}
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ k8s_loki_acl_whitelist }}"
{% endif %}
  labels:
    app.kubernetes.io/instance: loki
    app.kubernetes.io/name: loki
  name: loki
spec:
  ingressClassName: nginx
  rules:
  - host: {{k8s_loki_ingress_host | default('loki.example.com')}}
    http:
      paths:
      - backend:
          service:
            name: loki-gateway
            port:
              number: 80
        path: /
        pathType: Prefix