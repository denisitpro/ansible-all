# Pod monitoring configuration - Prometheus will monitor pods with specific selectors
k8s_pod_monitoring_enabled: "true"

# Loki monitoring configuration - Enable ServiceMonitor for prometheus-operator
k8s_loki_monitoring_enabled: "true"

# Pod monitoring configuration
k8s_pod_monitoring_config:
  # Which pods to monitor (by labels/annotations)
  selector:
    matchLabels:
      prometheus.io/scrape: "true"

  # Monitor pods in ALL namespaces (dynamic discovery)
  namespaceSelector: {}

# Ingress nginx mode configuration
# Available modes:
#   - network_mode: hostNetwork mode for direct host network binding (default, best performance)
#   - node_port: NodePort service mode (for external load balancers)
#   - host_port: hostPort mode for specific port binding via pod spec
nginx_ingress_mode: "network_mode"

# Ingress node labeling configuration
# These labels will be applied to nodes with k8s_ingress=nginx tag in inventory
k8s_ingress_label_key: "ingress.nginx/enabled"
k8s_ingress_label_value: "enabled"

# Traefik node labeling configuration
# These labels are applied to nodes with k8s_ingress=traefik and can be used for Traefik nodeSelector
k8s_traefik_inventory_tag_value: "traefik"
k8s_traefik_label_key: "ingress.traefik/enabled"
k8s_traefik_label_value: "enabled"
traefik_auto_node_selector_from_inventory_tag: true
# Traefik service exposure mode:
# - node_port: exposes NodePort 32080/32443 (default)
# - cluster_ip: ClusterIP only, no NodePort published on nodes
# - host_port: binds host ports on node via pod hostPort settings
# - network_mode: hostNetwork mode, Traefik listens on node ports directly (no hostPort NAT)
traefik_service_mode: "node_port"
# Traefik workload kind: Deployment or DaemonSet
traefik_deployment_kind: "Deployment"
# Traefik DaemonSet rolling update maxUnavailable (must be > 0 for hostNetwork)
traefik_daemonset_max_unavailable: 1
# Traefik DaemonSet rolling update maxSurge (must be 0 when maxUnavailable > 0)
traefik_daemonset_max_surge: 0
# Traefik metrics entrypoint port override for network_mode (avoid conflicts with node-exporter on 9100)
traefik_network_mode_metrics_port: 9101
# Expose Traefik dashboard (entrypoint traefik) as a Service port
traefik_dashboard_service_expose: false
traefik_dashboard_service_port: 8080

# Configuration for ansible-set-tags role to discover ingress nodes
# Searches for hosts with k8s_ingress: nginx tag and creates k8s_ingress_nodes_list variable
k8s_hosts_tag_configs:
  - tags:
      k8s_ingress: nginx
    output_var_name: k8s_ingress_nodes_list

# compability for new logical dedical components
# k8s group config
k8s_master_group_name: k8s_master_example
k8s_master_init_host: "{{ groups[k8s_master_group_name][0] }}"

kubeadmin_config: /etc/kubernetes/admin.conf
k8s_config_path: /etc/kubernetes/admin.conf

