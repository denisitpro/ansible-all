# Metric relabeling configuration for Prometheus scrape jobs
# Used to drop or keep specific metrics based on labels
# Example:
# k8s_prom_metric_relabel_configs:
#   - source_labels: [__name__]
#     regex: unwanted_metric_.*
#     action: drop
k8s_prom_metric_relabel_configs: []

# ServiceMonitor relabeling configuration
# Applied to all ServiceMonitors discovered by Prometheus
# Example:
# k8s_prom_service_monitor_relabel_configs:
#   - source_labels: [__name__]
#     regex: unwanted_metric_.*
#     action: drop
k8s_prom_service_monitor_relabel_configs: []

# Additional ServiceMonitors for custom application monitoring
# Example:
# k8s_prom_additional_service_monitors:
#   - name: applications-monitor
#     selector:
#       matchLabels:
#         prometheus.io/scrape: "true"
#     namespaceSelector:
#       any: true
#     endpoints:
#       - port: metrics
#         interval: 30s
#         metric_relabel_configs:
#           - source_labels: [__name__]
#             regex: unwanted_.*
#             action: drop
k8s_prom_additional_service_monitors: []
