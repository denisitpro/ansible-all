---
es_version: "6.7.2"
es_image: "docker.elastic.co/elasticsearch/elasticsearch"
es_image_name: "{{ es_image }}:{{ es_version }}"

es_compose_path: /opt/docker/elasticsearch

es_base_path: /opt/elasticsearch
es_data_path: "{{ es_base_path }}/data"
es_conf_path: "{{ es_base_path }}/config"
es_log_path: "{{ es_base_path }}/logs"
es_uid: 1000
es_gid: 1000

# Cluster settings
es_cluster_name: "es_production"
es_node_name: "{{ inventory_hostname_short }}"
es_network_host: "0.0.0.0"
es_http_port: 9200
es_transport_port: 9300

# Discovery (zen for 6.x)
# List of seed hosts for cluster discovery, e.g. ["node1", "node2"]
es_discovery_hosts: []
# Set to (N/2)+1 for multi-node clusters; 1 for single-node
es_minimum_master_nodes: 1

# JVM heap (set both to the same value, no more than 50% of RAM)
es_java_opts: "-Xms1g -Xmx1g"

# X-Pack
es_xpack_security_enabled: false
es_xpack_monitoring_enabled: false

es_restart: "always"
