---
- name: Stop and remove elasticsearch-exporter container
  community.docker.docker_compose_v2:
    project_src: "{{ elasticsearch_exporter_compose_path }}"
    state: absent
  failed_when: false

- name: Remove compose directory
  ansible.builtin.file:
    path: "{{ elasticsearch_exporter_compose_path }}"
    state: absent

- name: Remove Consul service definition
  ansible.builtin.file:
    path: /etc/consul.d/elasticsearch-exporter.hcl
    state: absent
  notify: reload consul
  when: consul_elasticsearch_exporter_enabled | default(true) | bool
