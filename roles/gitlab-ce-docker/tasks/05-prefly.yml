---
- name: create docker folder
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0775'
    owner: root
    group: root
  with_items:
    - "/opt/docker"
    - "{{ gitlab_docker_compose_path }}"


- name: create folder gitlab
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  with_items:
    - "{{ gitlab_data_path }}"
    - "{{ gitlab_data_path }}/data"
    - "{{ gitlab_data_path }}/conf"
    - "{{ gitlab_data_path }}/logs"
    - "{{ gitlab_backup_path }}"

