---
gitlab_registry: gitlab/gitlab-ce
gitlab_image: 18.7.5-ce.0


gitlab_bind_addr: "{{ ansible_facts['default_ipv4']['address'] }}"
gitlab_ssh_port: 2222
gitlab_prom_port: 9090

gitlab_docker_compose_path: "/opt/docker/gitlab"

gitlab_data_path: /opt/gitlab
gitlab_conf_path: "{{ gitlab_data_path }}/conf"
gitlab_backup_path: /mnt/gitlab-backup

# Backup configuration
gitlab_backup_enabled: false

# Cron schedule for GitLab backup
gitlab_backup_cron_enabled: false
gitlab_backup_cron_minute: "0"
gitlab_backup_cron_hour: "3"
gitlab_backup_cron_day: "*"
gitlab_backup_cron_month: "*"
gitlab_backup_cron_weekday: "*"

gitlab_ssl_path: /opt/ssl
gitlab_ssl_cert_name: self-signed-cert.pem
gitlab_ssl_key_name: self-signed-key.pem

gitlab_external_url: "https://gitlab.example.com"

gitlab_settings:
   - external_url '{{ gitlab_external_url }}'
