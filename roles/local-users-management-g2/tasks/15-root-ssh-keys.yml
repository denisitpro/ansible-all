---
- name: Ensure .ssh directory exists for root
  ansible.builtin.file:
    path: "/root/.ssh"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Update authorized keys for user root (overwrite)
  ansible.builtin.copy:
    dest: "/root/.ssh/authorized_keys"
    content: "{{ root_user_authorized_keys | join('\n') }}\n"
    owner: root
    group: root
    mode: '0600'

- name: Ensure .ssh directory exists for user ubuntu
  ansible.builtin.file:
    path: "/home/ubuntu/.ssh"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0700'

- name: Add root authorized keys for user ubuntu
  ansible.builtin.blockinfile:
    path: "/home/ubuntu/.ssh/authorized_keys"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - ROOT KEYS"
    block: "{{ root_user_authorized_keys | join('\n') }}"
    owner: ubuntu
    group: ubuntu
    mode: '0600'
    create: yes
