---
- name: quemu - ubuntu
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
    update_cache: true
  when:
    - ansible_facts['distribution'] | lower == 'ubuntu'

# QEMU Guest Agent should be enabled in PVE
- name: Enable and start qemu-guest-agent service
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started
  when:
    - ansible_facts['distribution'] | lower == 'ubuntu'
  ignore_errors: true
