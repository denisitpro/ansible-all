---
- name: Copy vector compose file
  ansible.builtin.template:
    src: "docker-compose.vector.yml.j2"
    dest: "{{ vector_compose_path }}/docker-compose.yml"
    mode: "0644"
  notify: recreate-docker vector

- name: Copy Vector environment file
  ansible.builtin.template:
    src: "vector.environment.j2"
    dest: "{{ vector_compose_environment_file }}"
    owner: "{{ vector_uid }}"
    group: "{{ vector_gid }}"
    mode: "0600"
  notify: recreate-docker vector
