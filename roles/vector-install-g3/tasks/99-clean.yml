---
- name: Stop docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ vector_compose_path }}"
    state: absent
  register: compose_result
  failed_when:
    - compose_result is failed
    - "'No such container' not in compose_result.msg"
  ignore_errors: true  # noqa: ignore-errors

- name: Stop and disable Vector systemd service
  ansible.builtin.systemd:
    name: vector
    state: stopped
    enabled: false
    daemon_reload: true
  ignore_errors: true  # noqa: ignore-errors

- name: Remove Vector systemd unit file
  ansible.builtin.file:
    path: "/etc/systemd/system/vector.service"
    state: absent

- name: Remove Vector files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "{{ vector_binary_path }}"
    - "{{ vector_environment_file }}"
    - "{{ vector_conf_path }}/vector.toml"
    - "{{ vector_log_path }}"
    - "{{ vector_base_path }}"

