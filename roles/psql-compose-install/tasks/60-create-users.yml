---
- name: Check if PostgreSQL container is running
  ansible.builtin.command: docker ps --filter "name={{ psql_docker_container_name }}" --filter "status=running" --format "{{ '{{' }}.Names{{ '}}' }}"
  register: psql_container_status
  failed_when: psql_container_status.stdout != psql_docker_container_name
  changed_when: false

- name: Verify PostgreSQL is accepting connections before creating users
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} pg_isready -U {{ psql_default_db_user }} -h localhost
  register: pg_connection_check
  failed_when: pg_connection_check.rc != 0
  changed_when: false

- name: Check if PostgreSQL user already exists
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} psql -U {{ psql_default_db_user }} -tAc "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '{{ item.name }}'"
  loop: "{{ psql_users }}"
  register: user_exists_check
  failed_when: false
  changed_when: false
  no_log: true

- name: Create PostgreSQL users
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} psql -U {{ psql_default_db_user }} -c "CREATE ROLE \"{{ item.item.name }}\" LOGIN PASSWORD '{{ item.item.password }}';"
  loop: "{{ user_exists_check.results }}"
  when: item.stdout != "1" and (item.item.is_replication is not defined or not item.item.is_replication)
  no_log: true
  register: create_user_result
  failed_when:
    - create_user_result.rc != 0
    - "'already exists' not in create_user_result.stderr"

- name: Grant roles to PostgreSQL users
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} psql -U {{ psql_default_db_user }} -c "GRANT \"{{ item.member_of | join('\", \"') }}\" TO \"{{ item.name }}\";"
  loop: "{{ psql_users }}"
  when: item.member_of is defined and item.member_of | length > 0
  no_log: true
  register: grant_roles_result
  failed_when:
    - grant_roles_result.rc != 0
    - "'already a member of role' not in grant_roles_result.stderr"

- name: Grant CREATEDB privilege to PostgreSQL users
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} psql -U {{ psql_default_db_user }} -c "ALTER ROLE \"{{ item.name }}\" CREATEDB;"
  loop: "{{ psql_users }}"
  when: item.can_create_db is defined and item.can_create_db
  no_log: true
  register: grant_createdb_result
  failed_when: grant_createdb_result.rc != 0

- name: Force update password for users
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} psql -U {{ psql_default_db_user }} -c "ALTER ROLE \"{{ item.name }}\" WITH PASSWORD '{{ item.password }}';"
  loop: "{{ psql_users }}"
  when: psql_force_password_update is defined and psql_force_password_update
  no_log: true
  register: force_password_update_result
  failed_when: force_password_update_result.rc != 0

- name: Force grant roles for users
  ansible.builtin.command: docker exec {{ psql_docker_container_name }} psql -U {{ psql_default_db_user }} -c "GRANT \"{{ item.member_of | join('\", \"') }}\" TO \"{{ item.name }}\";"
  loop: "{{ psql_users }}"
  when: psql_force_grant_update is defined and psql_force_grant_update and item.member_of is defined and item.member_of | length > 0
  no_log: true
  register: force_grant_roles_result
  failed_when: force_grant_roles_result.rc != 0
