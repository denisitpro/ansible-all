---
- name: Debug docker_arch
  ansible.builtin.debug:
    msg: "Docker architecture is: {{ go_arch }}"

# apt-key is gone on modern Ubuntu (removed in 24.04+, absent on 26.04), so
# the apt_key module fails with "Failed to find required executable apt-key".
# Use the keyring + signed-by method (Docker's current recommendation); it also
# works on the older releases this role already targets.
- name: Ensure apt keyrings directory exists - Ubuntu
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Docker GPG key - Ubuntu
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

# deb822_repository (the non-deprecated replacement for apt_repository) imports
# the python3-debian library on the target, so make sure it is present first.
- name: Ensure python3-debian present (required by deb822_repository) - Ubuntu
  ansible.builtin.apt:
    name: python3-debian
    state: present
    update_cache: true

- name: Add Docker APT repository - Ubuntu
  ansible.builtin.deb822_repository:
    name: docker
    types: deb
    uris: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ go_arch }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
    enabled: true

# The previous apt_repository task wrote an auto-named *.list file; the repo is
# now a deb822 *.sources file, so drop the stale *.list to avoid apt
# "configured multiple times" warnings. Matched by content, not a guessed name.
- name: Find stale Docker .list repo file(s) - Ubuntu
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    contains: "download.docker.com"
  register: docker_stale_list

- name: Remove stale Docker .list repo file(s) - Ubuntu
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ docker_stale_list.files }}"
  loop_control:
    label: "{{ item.path }}"
