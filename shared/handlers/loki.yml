---
- name: recreate-docker loki
  community.docker.docker_compose_v2:
    project_src: "{{ loki_compose_path }}"
    state: present
    recreate: always
    pull: always

- name: restart-docker loki
  community.docker.docker_compose_v2:
    project_src: "{{ loki_compose_path }}"
    state: restarted
