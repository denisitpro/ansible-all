---
- name: recreate-docker jira-service-portal
  community.docker.docker_compose_v2:
    project_src: "{{ jira_service_portal_compose_path }}"
    state: present
    recreate: always
    pull: always

- name: restart-docker jira-service-portal
  community.docker.docker_compose_v2:
    project_src: "{{ jira_service_portal_compose_path }}"
    state: restarted
